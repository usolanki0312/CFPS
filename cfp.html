<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call for Papers · ConfManage</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="cfp">
  <template id="page-content">
    <div class="page-head">
      <h1>Call for Papers</h1>
      <p>Published calls open for submission. Read the call, then submit your abstract or paper to the relevant track.</p>
    </div>
    <div id="cfp-list"></div>
  </template>
  <script src="assets/app.js"></script>
  <script>
  (function () {
    var db = CMS.load();
    var box = document.querySelector(".content #cfp-list");
    var open = db.conferences.filter(function (cf){ return cf.status === "cfp"; });
    var only = CMS.param("conf");
    if (only) open = open.filter(function(cf){ return cf.id === only; });

    if (!open.length) {
      box.innerHTML = '<div class="empty"><div class="ico">▦</div><h3>No open Calls for Papers</h3><p>Published calls will appear here when conference admins publish them.</p></div>';
      return;
    }
    box.innerHTML = open.map(function (cf) {
      var tracks = db.tracks.filter(function (t){ return t.conferenceId === cf.id; });
      return '<div class="card">' +
        '<div class="head-row"><div><div style="font-size:16px;font-weight:650">'+CMS.esc(cf.name)+' '+CMS.statusBadge("cfp")+'</div>' +
          '<div class="muted small" style="margin-top:3px">'+CMS.esc(cf.acronym)+' · '+CMS.esc(cf.venue)+', '+CMS.esc(cf.city)+'</div></div>' +
          '<a class="btn btn-primary btn-sm" href="submit-paper.html?conf='+cf.id+'">Submit ↥</a></div>' +
        '<dl class="kv" style="margin:14px 0">' +
          '<dt>Abstract deadline</dt><dd>'+CMS.fmtDate(cf.abstractDeadline)+'</dd>' +
          '<dt>Submission deadline</dt><dd>'+CMS.fmtDate(cf.submissionDeadline)+'</dd>' +
          '<dt>Tracks</dt><dd>'+(tracks.map(function(t){return CMS.esc(t.name);}).join(", ")||"—")+'</dd>' +
        '</dl>' +
        '<div class="divider"></div>' +
        '<div class="small" style="white-space:pre-wrap;color:#3b4350">'+CMS.esc(cf.cfpContent||"No CFP content provided.")+'</div>' +
      '</div>';
    }).join("");
  })();
  </script>
</body>
</html>
