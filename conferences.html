<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Conferences · ConfManage</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="conferences">
  <template id="page-content">
    <div class="page-head head-row">
      <div>
        <h1>My Conferences</h1>
        <p>Open a conference to work on it. The one you open becomes your active conference.</p>
      </div>
      <a class="btn btn-primary" href="create-conference.html">＋ Create Conference</a>
    </div>
    <div id="list"></div>
  </template>

  <script src="assets/app.js"></script>
  <script>
  (function () {
    var db = CMS.load();
    var c = document.querySelector(".content");
    var activeId = CMS.getConf();

    if (!db.conferences.length) {
      c.querySelector("#list").innerHTML = '<div class="empty"><div class="ico">▤</div><h3>No conferences yet</h3><p>Create your first conference to get started.</p><a class="btn btn-primary" href="create-conference.html">Create Conference</a></div>';
      return;
    }

    c.querySelector("#list").innerHTML = db.conferences.map(function (cf) {
      var tracks = db.tracks.filter(function (t){ return t.conferenceId === cf.id; }).length;
      var papers = db.papers.filter(function (p){ return p.conferenceId === cf.id; }).length;
      var isActive = cf.id === activeId;
      return '<div class="card">' +
        '<div class="head-row">' +
          '<div><div style="font-size:16px;font-weight:650">'+CMS.esc(cf.name)+' '+CMS.statusBadge(cf.status)+(isActive?' <span class="badge accepted">Active</span>':'')+'</div>' +
            '<div class="muted small" style="margin-top:3px">'+CMS.esc(cf.acronym)+' · '+CMS.esc(cf.id)+' · '+CMS.esc(cf.city||"")+' '+CMS.esc(cf.country||"")+'</div></div>' +
          '<a class="btn '+(isActive?'btn-ghost':'btn-primary')+' btn-sm" href="conference-overview.html?conf='+cf.id+'">'+(isActive?'Open':'Open')+' →</a>' +
        '</div>' +
        '<dl class="kv" style="margin:14px 0 0">' +
          '<dt>Dates</dt><dd>'+CMS.fmtDate(cf.startDate)+' – '+CMS.fmtDate(cf.endDate)+'</dd>' +
          '<dt>Tracks / Papers</dt><dd>'+tracks+' tracks · '+papers+' papers</dd>' +
        '</dl>' +
      '</div>';
    }).join("");
  })();
  </script>
</body>
</html>
