<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reviewer Dashboard · ConfManage</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body data-page="dashboard-reviewer">
  <template id="page-content">
    <div class="page-head">
      <h1 id="hi">Reviewer</h1>
      <p id="rev-tracks">Your assigned papers and review activity. Open a paper to record your review.</p>
    </div>
    <div class="grid grid-3" id="stats"></div>
    <div class="card">
      <div class="head-row" style="margin-bottom:14px">
        <div class="card-title mb0">Papers assigned to me</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div id="tools" style="display:none;align-items:center;gap:10px">
            <label class="muted small" style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="dl-all"> Select all</label>
            <span class="muted small" id="selcount">0 selected</span>
            <button class="btn btn-subtle btn-sm" id="dl-zip" disabled>⬇ Attachments (ZIP)</button>
            <button class="btn btn-subtle btn-sm" id="dl-csv" disabled>⬇ Excel (CSV)</button>
          </div>
          <a class="btn btn-primary btn-sm" href="review-paper.html">Go to Review Paper</a>
        </div>
      </div>
      <div id="assigned"></div>
    </div>
  </template>
  <script src="assets/app.js"></script>
  <script>
  (function () {
    var db = CMS.load();
    var c = document.querySelector(".content");
    var me = CMS.currentReviewer(db);
    if (me) {
      c.querySelector("#hi").textContent = me.firstName + " " + me.lastName;
      var myTrackNames = (me.trackIds || []).map(function (id) {
        var t = db.tracks.find(function (x){ return x.id === id; }); return t ? t.name : id;
      });
      if (myTrackNames.length) c.querySelector("#rev-tracks").innerHTML = 'Reviewing for: <strong>' + myTrackNames.map(CMS.esc).join(", ") + '</strong>. Open a paper to record your review.';
    }
    var mine = me ? db.assignments.filter(function (a){ return a.reviewerId === me.id; }) : [];
    var myReviews = me ? db.reviews.filter(function (r){ return r.reviewerId === me.id; }) : [];
    var pending = mine.filter(function(a){ return !myReviews.some(function(r){ return r.paperId===a.paperId; }); }).length;

    c.querySelector("#stats").innerHTML =
      '<div class="stat"><div class="n">'+mine.length+'</div><div class="l">Assigned to me</div></div>' +
      '<div class="stat"><div class="n">'+pending+'</div><div class="l">Pending review</div></div>' +
      '<div class="stat"><div class="n">'+myReviews.length+'</div><div class="l">Reviews submitted</div></div>';

    if (!me) {
      c.querySelector("#assigned").innerHTML = '<div class="empty" style="padding:30px"><div class="ico">▤</div><h3>Not set up as a reviewer</h3><p>Accept a reviewer invitation to activate this workspace. Assigned papers will then appear here.</p></div>';
      return;
    }
    if (!mine.length) {
      c.querySelector("#assigned").innerHTML = '<div class="empty" style="padding:30px"><div class="ico">▤</div><h3>No papers assigned yet</h3><p>A Track Lead will assign papers to you from Review Assignment.</p></div>';
      return;
    }
    c.querySelector("#assigned").innerHTML = mine.map(function (a) {
      var p = db.papers.find(function(x){return x.id===a.paperId;}) || {};
      var myRev = myReviews.find(function(r){ return r.paperId===a.paperId; });
      var right = myRev ? '<span class="score-pill">'+myRev.score+'/10 · '+CMS.esc(myRev.recommendation)+'</span>'
        : '<a class="btn btn-primary btn-sm" href="review-submit.html?paper='+a.paperId+'">Review</a>';
      return '<div style="display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)">' +
        '<div style="display:flex;align-items:center;gap:12px"><input type="checkbox" class="dl-cb" data-id="'+CMS.esc(a.paperId)+'" aria-label="Select paper"><div><div style="font-weight:600">'+CMS.esc(p.title||a.paperId)+'</div><div class="muted small">'+CMS.esc(a.paperId)+'</div></div></div>'+right+'</div>';
    }).join("");

    // ----- Bulk download: select assigned papers, then download attachments (ZIP) or Excel (CSV) -----
    var assignedBox = c.querySelector("#assigned");
    var tools = c.querySelector("#tools");
    var allCb = c.querySelector("#dl-all");
    var zipBtn = c.querySelector("#dl-zip");
    var csvBtn = c.querySelector("#dl-csv");
    var countEl = c.querySelector("#selcount");
    var stamp = new Date().toISOString().slice(0, 10);
    tools.style.display = "flex";

    function boxes() { return Array.prototype.slice.call(assignedBox.querySelectorAll(".dl-cb")); }
    function selectedPapers() {
      var ids = {};
      boxes().forEach(function (cb) { if (cb.checked) ids[cb.getAttribute("data-id")] = true; });
      return mine.filter(function (a) { return ids[a.paperId]; })
        .map(function (a) { return db.papers.find(function (p) { return p.id === a.paperId; }); })
        .filter(Boolean);
    }
    function refresh() {
      var n = selectedPapers().length;
      countEl.textContent = n + " selected";
      zipBtn.disabled = csvBtn.disabled = n === 0;
      var bs = boxes();
      allCb.checked = bs.length > 0 && bs.every(function (cb) { return cb.checked; });
    }
    allCb.addEventListener("change", function () {
      boxes().forEach(function (cb) { cb.checked = allCb.checked; });
      refresh();
    });
    assignedBox.addEventListener("change", function (e) {
      if (e.target && e.target.classList.contains("dl-cb")) refresh();
    });
    zipBtn.addEventListener("click", function () {
      var sel = selectedPapers();
      if (sel.length) CMS.downloadPapersZip(sel, db, "my-assigned-papers-" + stamp + ".zip");
    });
    csvBtn.addEventListener("click", function () {
      var sel = selectedPapers();
      if (sel.length) CMS.downloadPapersCsv(sel, db, "my-assigned-papers-" + stamp + ".csv");
    });
    refresh();
  })();
  </script>
</body>
</html>
