<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Track Team · ConfManage</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/theme.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="track-team">
  <template id="page-content">
    <div class="page-head">
      <h1>Track Team</h1>
      <p id="tt-sub">Invite and manage the people on your tracks. Invitees accept by link and gain the matching workspace.</p>
    </div>
    <div id="list"></div>
  </template>

  <script src="assets/app.js"></script>
  <script>
  (function () {
    var c = document.querySelector(".content");
    var cu = CMS.auth.current();
    var isAdmin = CMS.auth.hasRole("admin");
    var ws = CMS.getWorkspace();

    function isAccepted(x) { return !x.status || x.status === "accepted"; }
    function fullName(x) { return ((x.firstName || "") + " " + (x.lastName || "")).trim() || x.name || x.email; }
    function invBadge(s) {
      return s === "accepted" ? '<span class="badge accepted">Accepted</span>'
        : s === "declined" ? '<span class="badge rejected">Declined</span>'
        : '<span class="badge pending">Pending</span>';
    }
    function countryOptions() {
      return '<option value="">— Country / region —</option>' +
        CMS.COUNTRIES.map(function (cn) { return '<option value="' + cn + '">' + cn + "</option>"; }).join("");
    }
    function invForm(type, trackId, label) {
      return '<details style="margin-top:10px"><summary class="small" style="cursor:pointer;color:var(--primary-d);font-weight:600">＋ ' + label + '</summary>' +
        '<form class="invite-form" data-type="' + type + '" data-track="' + trackId + '" style="margin-top:10px">' +
          '<div class="form-grid">' +
            '<div class="field"><label>First name</label><input type="text" name="firstName"></div>' +
            '<div class="field"><label>Last name</label><input type="text" name="lastName"></div>' +
            '<div class="field"><label>Email <span class="req">*</span></label><input type="email" name="email"></div>' +
            '<div class="field"><label>Phone <span class="hint" style="font-weight:400">(optional)</span></label><input type="tel" name="phone"></div>' +
            '<div class="field"><label>Affiliation</label><input type="text" name="affiliation"></div>' +
            '<div class="field"><label>Country / Region</label><select name="country">' + countryOptions() + '</select></div>' +
          '</div>' +
          '<div class="form-actions"><button type="submit" class="btn btn-primary">＋ ' + label + '</button></div>' +
        '</form></details>';
    }
    function personRow(name, email, status, canManage, invId) {
      var actions = (canManage && invId)
        ? '<a class="btn btn-ghost btn-sm" href="accept-invitation.html?inv=' + invId + '">Open link</a><button class="btn btn-danger btn-sm inv-remove" data-id="' + invId + '">Cancel</button>'
        : (invId && status === "pending" ? '<a class="btn btn-ghost btn-sm" href="accept-invitation.html?inv=' + invId + '">Open link</a>' : '');
      return '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--border);border-radius:9px;padding:9px 12px;margin-bottom:8px">' +
        '<div><div style="font-weight:600">' + CMS.esc(name) + '</div><div class="muted small">' + CMS.esc(email) + ' · ' + invBadge(status) + '</div></div>' +
        '<div class="t-actions">' + actions + '</div></div>';
    }

    function render() {
      var db = CMS.load();
      var lead = CMS.currentLead(db);
      var confId = CMS.param("conf") || CMS.getConf();
      var conf = db.conferences.find(function (x) { return x.id === confId; }) || {};
      var adminMode = ws === "admin" && isAdmin;
      var leadMode = ws === "lead" && !!lead;

      var tracks = adminMode ? db.tracks.filter(function (t) { return t.conferenceId === confId; })
        : leadMode ? db.tracks.filter(function (t) { return t.trackLeadId === lead.id; })
        : [];

      c.querySelector("#tt-sub").innerHTML = adminMode
        ? 'Managing team for <strong>' + CMS.esc(conf.acronym || conf.name || "—") + '</strong>. Assign or invite <strong>Track Leads</strong>; each Track Lead manages their reviewers.'
        : leadMode ? 'Assign or invite <strong>Reviewers</strong> for your tracks.'
        : 'Team management is available to Conference Admins and Track Leads.';

      if (!tracks.length) {
        c.querySelector("#list").innerHTML = '<div class="empty"><div class="ico">⇄</div><h3>No tracks to manage</h3><p>' +
          (adminMode ? 'Add tracks first from Tracks.' : 'You are not leading any tracks yet.') + '</p></div>';
        return;
      }

      var acceptedLeads = db.trackLeads.filter(function (l) { return isAccepted(l) && (l.conferenceId === confId || !l.conferenceId); });

      c.querySelector("#list").innerHTML = tracks.map(function (t) {
        var leadRec = db.trackLeads.find(function (l) { return l.id === t.trackLeadId; });
        var leadPend = db.invitations.filter(function (i) { return i.type === "lead" && i.trackId === t.id && i.status === "pending"; });
        var revPend = db.invitations.filter(function (i) { return i.type === "reviewer" && i.trackId === t.id && i.status === "pending"; });
        var revOnTrack = db.reviewers.filter(function (r) { return (r.trackIds || []).indexOf(t.id) >= 0; });

        // ----- Track Lead block (admin only) -----
        var leadBlock = '<div class="card-title" style="font-size:13px">Track Lead</div>' +
          '<div class="small" style="margin-bottom:8px">' + (leadRec ? 'Current: <strong>' + CMS.esc(leadRec.name) + '</strong> ' + invBadge("accepted") : '<span class="muted">Not assigned yet</span>') + '</div>';
        if (adminMode) {
          if (acceptedLeads.length) {
            leadBlock += '<div class="field"><label>Assign an accepted track lead</label><select class="tl-assign" data-track="' + t.id + '"><option value="">— Select accepted track lead —</option>' +
              acceptedLeads.map(function (l) { return '<option value="' + l.id + '"' + (l.id === t.trackLeadId ? " selected" : "") + ">" + CMS.esc(l.name) + " · " + CMS.esc(l.email) + "</option>"; }).join("") + '</select></div>';
          }
          leadBlock += leadPend.map(function (i) { return personRow(i.name || i.email, i.email, i.status, true, i.id); }).join("");
          leadBlock += invForm("lead", t.id, "Invite Track Lead");
        }

        // ----- Reviewers block (lead manages; admin read-only) -----
        var acceptedRevs = db.reviewers.filter(function (r) { return isAccepted(r) && (r.trackIds || []).indexOf(t.id) < 0; });
        var revBlock = '<div class="divider"></div><div class="card-title" style="font-size:13px">Reviewers</div>' +
          (revOnTrack.length ? revOnTrack.map(function (r) { return personRow(fullName(r), r.email, r.status || "accepted", false, null); }).join("")
            : '<div class="muted small" style="margin-bottom:8px">No reviewers on this track yet.</div>');
        if (leadMode) {
          if (acceptedRevs.length) {
            revBlock += '<div class="field"><label>Add an accepted reviewer</label><select class="rev-assign" data-track="' + t.id + '"><option value="">— Select accepted reviewer —</option>' +
              acceptedRevs.map(function (r) { return '<option value="' + r.id + '">' + CMS.esc(fullName(r)) + " · " + CMS.esc(r.email) + "</option>"; }).join("") + '</select></div>';
          }
          revBlock += revPend.map(function (i) { return personRow(i.name || i.email, i.email, i.status, true, i.id); }).join("");
          revBlock += invForm("reviewer", t.id, "Invite Reviewer");
        } else {
          revBlock += revPend.map(function (i) { return personRow(i.name || i.email, i.email, i.status, false, i.id); }).join("");
          revBlock += '<div class="muted small">Reviewers are invited by the Track Lead of this track.</div>';
        }

        return '<div class="card">' +
          '<div style="font-size:15px;font-weight:650;margin-bottom:4px">' + CMS.esc(t.name) + '</div>' +
          '<div class="muted small" style="margin-bottom:14px">' + CMS.esc(t.id) + '</div>' +
          leadBlock + revBlock + '</div>';
      }).join("");

      wire();
    }

    function wire() {
      // Assign an accepted lead.
      c.querySelectorAll(".tl-assign").forEach(function (sel) {
        sel.addEventListener("change", function () {
          if (!sel.value) return;
          var db = CMS.load();
          var tr = db.tracks.find(function (t) { return t.id === sel.getAttribute("data-track"); });
          var l = db.trackLeads.find(function (x) { return x.id === sel.value; });
          if (tr && l) { tr.trackLeadId = l.id; tr.trackLead = l.name; CMS.save(db); CMS.toast("Track lead assigned", l.name + " now leads " + tr.name); render(); }
        });
      });
      // Add an accepted reviewer to a track.
      c.querySelectorAll(".rev-assign").forEach(function (sel) {
        sel.addEventListener("change", function () {
          if (!sel.value) return;
          var db = CMS.load();
          var tid = sel.getAttribute("data-track");
          var r = db.reviewers.find(function (x) { return x.id === sel.value; });
          if (r) { if (!r.trackIds) r.trackIds = []; if (r.trackIds.indexOf(tid) < 0) r.trackIds.push(tid); CMS.save(db); CMS.toast("Reviewer added", fullName(r) + " added to the track."); render(); }
        });
      });
      // Invite a new person -> pool entry (invited) + invitation (pending).
      c.querySelectorAll(".invite-form").forEach(function (f) {
        f.addEventListener("submit", function (e) {
          e.preventDefault();
          var d = Object.fromEntries(new FormData(f).entries());
          if (!/^\S+@\S+\.\S+$/.test(d.email || "")) { CMS.toast("Valid email required", "Enter the invitee's email.", "err"); return; }
          var db = CMS.load();
          var type = f.getAttribute("data-type"), trackId = f.getAttribute("data-track");
          var track = db.tracks.find(function (t) { return t.id === trackId; }) || {};
          var name = ((d.firstName || "") + " " + (d.lastName || "")).trim() || d.email.trim();
          if (db.invitations.some(function (i) { return i.type === type && i.trackId === trackId && i.email.toLowerCase() === d.email.toLowerCase() && i.status === "pending"; })) {
            CMS.toast("Already invited", "A pending invitation already exists for this email.", "err"); return;
          }
          if (type === "lead") {
            if (!db.trackLeads.some(function (l) { return l.email && l.email.toLowerCase() === d.email.toLowerCase(); })) {
              db.trackLeads.push({ id: CMS.uid("TL-"), firstName: (d.firstName || "").trim(), lastName: (d.lastName || "").trim(), name: name,
                email: d.email.trim(), phone: (d.phone || "").trim(), affiliation: (d.affiliation || "").trim(), organization: (d.affiliation || "").trim(),
                country: d.country || "", status: "invited", conferenceId: track.conferenceId || (CMS.param("conf") || CMS.getConf()) });
            }
          } else {
            if (!db.reviewers.some(function (r) { return r.email && r.email.toLowerCase() === d.email.toLowerCase(); })) {
              db.reviewers.push({ id: CMS.uid("REV-"), firstName: (d.firstName || "").trim(), lastName: (d.lastName || "").trim(),
                email: d.email.trim(), phone: (d.phone || "").trim(), organization: (d.affiliation || "").trim(), affiliation: (d.affiliation || "").trim(),
                country: d.country || "", role: "Reviewer", status: "invited", trackIds: [], invitation: "" });
            }
          }
          db.invitations.push({ id: CMS.uid("INV-"), type: type, conferenceId: track.conferenceId || (CMS.param("conf") || CMS.getConf()),
            trackId: trackId, email: d.email.trim(), name: name, status: "pending",
            invitedBy: isAdmin && ws === "admin" ? (cu.firstName + " " + cu.lastName + " (Admin)") : (cu.firstName + " " + cu.lastName + " (Track Lead)"),
            timestamp: new Date().toISOString() });
          CMS.save(db);
          CMS.toast((type === "lead" ? "Track Lead" : "Reviewer") + " invited", d.email.trim() + " — pending acceptance.");
          render();
        });
      });
      c.querySelectorAll(".inv-remove").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var db = CMS.load();
          db.invitations = db.invitations.filter(function (i) { return i.id !== btn.getAttribute("data-id"); });
          CMS.save(db);
          CMS.toast("Invitation removed", "");
          render();
        });
      });
    }

    render();
  })();
  </script>
</body>
</html>
